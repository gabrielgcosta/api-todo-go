version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: todo_postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: todo_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    env_file:
      - .env

  api:
    build: .
    container_name: todo_api
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - db
      - rabbitmq

volumes:
  postgres_data: